<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>
</head>
<body>

    <h2>Data Mahasiswa</h2>

    <form action="" method="post">
        <table border="0" cellpadding="5">
            
            <tr>
                <td><label for="nim">NIM :</label></td>
                <td><input type="text" id="nim" name="nim" size="15"></td>
            </tr>

            <tr>
                <td><label for="nama">Nama :</label></td>
                <td><input type="text" id="nama" name="nama" size="30"></td>
            </tr>

            <tr>
                <td><label for="tgl">Tgl Lahir (dd-mm-yyyy) :</label></td>
                <td><input type="date" id="tgl" name="tgl_lahir"></td>
            </tr>

            <tr>
                <td valign="top">Jenis Kelamin :</td>
                <td>
                    <input type="radio" id="lk" name="gender" value="Laki-Laki">
                    <label for="lk">Laki-Laki</label>
                    
                    <input type="radio" id="pr" name="gender" value="Perempuan">
                    <label for="pr">Perempuan</label>
                </td>
            </tr>

            <tr>
                <td valign="top"><label for="alamat">Alamat di Bandung :</label></td>
                <td><textarea id="alamat" name="alamat" rows="4" cols="30"></textarea></td>
            </tr>

            <tr>
                <td><label for="tinggal">Tinggal di :</label></td>
                <td>
                    <select id="tinggal" name="tinggal">
                        <option value="">--pilih--</option>
                        <option value="kos">Kos/kontrakan</option>
                        <option value="saudara">Rumah saudara</option>
                        <option value="orangtua">Rumah orang tua</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td valign="top">Pilih 2 hobi yang paling disukai :</td>
                <td>
                    <input type="checkbox" id="science" name="hobi" value="Science">
                    <label for="science">Science</label><br>
                    
                    <input type="checkbox" id="technology" name="hobi" value="Technology">
                    <label for="technology">Technology</label><br>
                    
                    <input type="checkbox" id="art" name="hobi" value="Art">
                    <label for="art">Art</label><br>
                    
                    <input type="checkbox" id="sport" name="hobi" value="Sport">
                    <label for="sport">Sport</label>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <br>
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
